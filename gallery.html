<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Pleasure 1 Aluminum Enterprise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(
        135deg,
        #f3eef7,
        #ece5f3,
        #f7f7f7
    );

    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    background:linear-gradient(90deg,#7b3f98,#9b59b6);
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.back{
    display:inline-block;
    margin:20px;
    padding:10px 18px;
    background:white;
    border-radius:30px;
    color:#7b3f98;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.back:hover{
    transform:translateY(-3px);
    background:#7b3f98;
    color:white;
}

.gallery{
    padding:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:22px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.15),
        inset 0 1px 1px rgba(255,255,255,0.4);

    transition:
        transform 0.5s ease,
        box-shadow 0.5s ease;

    animation:floatUp 1s ease forwards;
}

.card:hover{
    transform:
        translateY(-12px)
        scale(1.03)
        rotateX(4deg)
        rotateY(4deg);

    box-shadow:
        0 25px 50px rgba(123,63,152,0.35),
        0 0 25px rgba(155,89,182,0.3);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;

    transition:
        transform 0.8s ease,
        filter 0.6s ease;
}

.card:hover img{
    transform:scale(1.15);

    filter:
        brightness(0.75)
        contrast(1.1)
        saturate(1.2);
}

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );

    transition:0.7s;
}

.card:hover::before{
    left:100%;
}

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.45);

    color:white;
    font-size:20px;
    font-weight:bold;

    opacity:0;
    transition:0.4s ease;

    cursor:pointer;
    z-index:2;
}

.card:hover .overlay{
    opacity:1;
}

#lightbox{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.96);
    backdrop-filter:blur(10px);

    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;

    overflow:auto;
    padding:40px;
}

#lightbox img{
    width:auto;
    max-width:95%;
    max-height:none;

    border-radius:15px;

    transform:scale(0.8);
    animation:popup 0.4s ease forwards;
}

@keyframes popup{
    to{
        transform:scale(1);
    }
}

.zoom-text{
    color:white;
    margin-top:15px;
    font-size:15px;
    opacity:0.8;
}

.close{
    position:absolute;
    top:20px;
    right:30px;

    font-size:40px;
    color:white;
    cursor:pointer;
}

.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);

    font-size:50px;
    color:white;

    cursor:pointer;
    user-select:none;
}

.prev{left:20px;}
.next{right:20px;}

@keyframes floatUp{
    from{
        opacity:0;
        transform:
            translateY(40px)
            scale(0.9);
    }

    to{
        opacity:1;
        transform:
            translateY(0)
            scale(1);
    }
}

</style>
</head>

<body>

<header>Our Work Gallery</header>

<a href="index.html" class="back">⬅ Back to Home</a>

<div class="gallery">

<div class="card">
<img src="IMG-20260426-WA0003.jpg" loading="lazy">
<div class="overlay" onclick="openImage(0)">View Design</div>
</div>

<div class="card">
<img src="IMG-20260426-WA0004.jpg" loading="lazy">
<div class="overlay" onclick="openImage(1)">View Design</div>
</div>

<div class="card">
<img src="IMG-20260426-WA0005.jpg" loading="lazy">
<div class="overlay" onclick="openImage(2)">View Design</div>
</div>

<!-- Continue same pattern for all remaining images until WA0045 -->

</div>

<div id="lightbox">

<span class="close" onclick="closeImage()">&times;</span>

<span class="nav prev" onclick="prevImage()">❮</span>

<img id="lightbox-img">

<div class="zoom-text">
Scroll to view full design
</div>

<span class="nav next" onclick="nextImage()">❯</span>

</div>

<script>

let images = [
"IMG-20260426-WA0003.jpg",
"IMG-20260426-WA0004.jpg",
"IMG-20260426-WA0005.jpg",

"IMG-20260426-WA0013.jpg",
"IMG-20260426-WA0014.jpg",
"IMG-20260426-WA0015.jpg",
"IMG-20260426-WA0016.jpg",
"IMG-20260426-WA0017.jpg",
"IMG-20260426-WA0018.jpg",

"IMG-20260426-WA0040.jpg",
"IMG-20260426-WA0041.jpg",
"IMG-20260426-WA0042.jpg",
"IMG-20260426-WA0043.jpg",
"IMG-20260426-WA0044.jpg",
"IMG-20260426-WA0045.jpg"
];

let currentIndex = 0;

function openImage(index){

    currentIndex = index;

    document.getElementById("lightbox").style.display = "flex";

    document.getElementById("lightbox-img").src = images[index];

    document.body.style.overflow = "hidden";
}

function closeImage(){

    document.getElementById("lightbox").style.display = "none";

    document.body.style.overflow = "auto";
}

function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("lightbox-img").src = images[currentIndex];
}

function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("lightbox-img").src = images[currentIndex];
}

window.addEventListener("scroll", function(){

    if(document.getElementById("lightbox").style.display === "flex"){
        closeImage();
    }

});

</script>

</body>
</html>
