<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Pleasure 1 Aluminum Enterprise</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#7b3f98;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* BACK BUTTON */
.back {
    display:block;
    margin:20px;
    color:#7b3f98;
    text-decoration:none;
    font-weight:bold;
}

/* GALLERY */
.gallery {
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:15px;
}

.gallery img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover {
    transform:scale(1.05);
}

/* LIGHTBOX */
#lightbox {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

#lightbox img {
    max-width:90%;
    max-height:90%;
}

.close {
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>Our Work Gallery</header>

<a href="index.html" class="back">⬅ Back to Home</a>

<div class="gallery">
    <img src="IMG-20260425-WA0000.jpg" onclick="openImage(this.src)">
    <img src="IMG-20260425-WA0001.jpg" onclick="openImage(this.src)">
    <img src="IMG-20260425-WA0002.jpg" onclick="openImage(this.src)">
    <img src="IMG-20260425-WA0003.jpg" onclick="openImage(this.src)">
    <img src="IMG-20260425-WA0004.jpg" onclick="openImage(this.src)">
    <img src="IMG-20260425-WA0005.jpg" onclick="openImage(this.src)">
</div>

<div id="lightbox" onclick="closeImage()">
    <span class="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openImage(src){
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImage(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
  </html>
