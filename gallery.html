<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ece9f1,#f5f5f5);
}

/* HEADER */
header {
    background:linear-gradient(90deg,#7b3f98,#9b59b6);
    color:white;
    padding:18px;
    text-align:center;
    font-size:24px;
}

/* BACK BUTTON */
.back {
    display:inline-block;
    margin:20px;
    color:#7b3f98;
    text-decoration:none;
    font-weight:bold;
}

/* GRID */
.gallery {
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */
.card {
    position:relative;
    border-radius:18px;
    overflow:hidden;
    transform-style:preserve-3d;
    transition:transform 0.4s;
    animation:fadeUp 0.8s ease forwards;
}

/* IMAGE */
.card img {
    width:100%;
    height:230px;
    object-fit:cover;
    display:block;
    transition:0.5s;
}

/* 3D HOVER */
.card:hover {
    transform:rotateY(5deg) rotateX(5deg) scale(1.05);
}

/* IMAGE EFFECT */
.card:hover img {
    transform:scale(1.15);
    filter:brightness(70%);
}

/* SHINE EFFECT */
.card::before {
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.5s;
}

.card:hover::before {
    left:100%;
}

/* OVERLAY TEXT */
.overlay {
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    text-align:center;
    color:white;
    background:rgba(0,0,0,0.5);
    opacity:0;
    transition:0.4s;
}

.card:hover .overlay {
    opacity:1;
}

/* LIGHTBOX */
#lightbox {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.96);
    backdrop-filter:blur(10px);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#lightbox img {
    max-width:85%;
    max-height:80%;
    border-radius:12px;
    animation:zoom 0.4s ease;
}

/* NAV */
.nav {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    color:white;
    cursor:pointer;
}

.prev { left:20px; }
.next { right:20px; }

/* CLOSE */
.close {
    position:absolute;
    top:20px;
    right:30px;
    font-size:35px;
    color:white;
    cursor:pointer;
}

/* ANIMATIONS */
@keyframes zoom {
    from {transform:scale(0.6);opacity:0;}
    to {transform:scale(1);opacity:1;}
}

@keyframes fadeUp {
    from {opacity:0;transform:translateY(40px);}
    to {opacity:1;transform:translateY(0);}
}
</style>
</head>

let index = 0;

function openImage(i){
    index = i;
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=images[i];
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}

function nextImage(){
    index=(index+1)%images.length;
    document.getElementById("lightbox-img").src=images[index];
}

function prevImage(){
    index=(index-1+images.length)%images.length;
    document.getElementById("lightbox-img").src=images[index];
}

document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowRight") nextImage();
    if(e.key==="ArrowLeft") prevImage();
    if(e.key==="Escape") closeImage();
});
</script>
