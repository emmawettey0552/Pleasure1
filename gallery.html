<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#f5f5f5,#eaeaea);
}

/* HEADER */
header {
    background: linear-gradient(90deg,#7b3f98,#9b59b6);
    color:white;
    padding:18px;
    text-align:center;
    font-size:24px;
    letter-spacing:1px;
}

/* BACK BUTTON */
.back {
    display:inline-block;
    margin:20px;
    color:#7b3f98;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.back:hover {
    color:#9b59b6;
}

/* GALLERY GRID */
.gallery {
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

/* IMAGE CARD */
.image-box {
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
    animation:fadeIn 0.8s ease forwards;
}

.image-box img {
    width:100%;
    height:220px;
    object-fit:cover;
    transition:0.5s;
}

/* HOVER EFFECT */
.image-box:hover img {
    transform:scale(1.1);
    filter:brightness(70%);
}

/* OVERLAY */
.overlay {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:18px;
    font-weight:bold;
    opacity:0;
    transition:0.4s;
    background:rgba(0,0,0,0.4);
}

.image-box:hover .overlay {
    opacity:1;
}

/* LIGHTBOX */
#lightbox {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    backdrop-filter:blur(8px);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#lightbox img {
    max-width:85%;
    max-height:80%;
    border-radius:10px;
    animation:zoom 0.4s ease;
}

/* CLOSE */
.close {
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:35px;
    cursor:pointer;
}

/* NAV BUTTONS */
.nav-btn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    color:white;
    cursor:pointer;
    padding:10px;
}

.prev { left:20px; }
.next { right:20px; }

/* ANIMATIONS */
@keyframes zoom {
    from {transform:scale(0.7); opacity:0;}
    to {transform:scale(1); opacity:1;}
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>
